<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepQuant App</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
<div id="app" class="app-page">
  <header id="header">
    <div class="logo">Deep<span>Quant</span> App</div>
    <div style="margin-left:auto">
      <a href="/index.html" class="btn btn-sm">← 交易面板</a>
    </div>
  </header>
  <div class="app-content">
    <div v-if="appName === 'PaperAccount'"><paper-account></paper-account></div>
    <div v-else-if="appName === 'CtaStrategy'"><cta-strategy></cta-strategy></div>
    <div v-else-if="appName === 'CtaBacktester'"><cta-backtester></cta-backtester></div>
    <div v-else-if="appName === 'DataManager'"><data-manager></data-manager></div>
    <div v-else><h2>未知 App: {{ appName }}</h2></div>
  </div>
</div>
<script src="/js/apps-app.js"></script>
</body>
</html>
