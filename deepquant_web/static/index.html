<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepQuant Trader</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
<div id="app">
  <!-- Header -->
  <header id="header">
    <div class="logo">Deep<span>Quant</span> Trader</div>
    <div class="ws-status">
      <div class="ws-dot" :class="$s.wsStatus ? 'on' : 'off'"></div>
      <span>{{ $s.wsStatus ? '已连接' : '未连接' }}</span>
      <button class="btn btn-xs" @click="wsReconnect" title="重新连接">↻</button>
    </div>
    <div class="ws-actions">
      <a href="/apps.html?app=PaperAccount" class="btn btn-sm">账户管理</a>
      <a href="/apps.html?app=CtaStrategy" class="btn btn-sm">策略管理</a>
      <button class="btn btn-sm btn-primary" @click="showAccountModal = true">账户详情</button>
    </div>
    <div id="clock" class="clock">--:--:--</div>
  </header>

  <!-- Navbar -->
  <nav id="navbar">
    <button class="nav-btn active">交易面板</button>
    <div style="margin-left:auto;display:flex;gap:4px">
      <button class="btn btn-sm btn-danger" @click="cancelAll">全部撤单</button>
      <button class="btn btn-sm" @click="refreshSub">刷新订阅</button>
    </div>
  </nav>

  <!-- Ticker Strip -->
  <ticker-strip :items="tickList" @pick="onPickTick"></ticker-strip>

  <!-- Trade Form -->
  <trade-form ref="tfRef" @order="onOrder"></trade-form>

  <!-- Main Grid -->
  <div id="main">
    <!-- Top-Left: Tick Table -->
    <section class="panel">
      <div class="panel-header">
        <span class="panel-title">📈 行情 Tick</span>
        <span class="panel-badge">{{ tickList.length }}</span>
      </div>
      <div class="panel-body">
        <tick-table :items="tickList" @pick="onPickTick"></tick-table>
      </div>
    </section>

    <!-- Top-Right: Depth Chart -->
    <section class="panel">
      <div class="panel-header">
        <span class="panel-title">📊 深度图</span>
        <span class="panel-badge">{{ depthSymbol || '—' }}</span>
      </div>
      <depth-chart ref="depthChart" :symbol="depthSymbol"></depth-chart>
    </section>

    <!-- Bottom-Left: Orders + Trades -->
    <section class="panel">
      <div class="panel-header">
        <span class="panel-title">📋 委托 / 成交</span>
        <div style="display:flex;gap:4px">
          <span class="panel-badge">{{ orderList.length }}</span>
          <span style="font-size:10px;color:var(--text-dim)">委托</span>
          <span class="panel-badge">{{ tradeList.length }}</span>
          <span style="font-size:10px;color:var(--text-dim)">成交</span>
        </div>
      </div>
      <div class="panel-body" style="display:flex;flex-direction:column;overflow:hidden">
        <div style="flex:1;overflow:auto">
          <div style="font-size:10px;color:var(--text-dim);padding:4px 12px;font-weight:600">委托</div>
          <order-table :items="orderList" @cancel="onCancelOrder"></order-table>
          <div style="font-size:10px;color:var(--text-dim);padding:4px 12px;font-weight:600;margin-top:4px">成交</div>
          <trade-table :items="tradeList"></trade-table>
        </div>
      </div>
    </section>

    <!-- Bottom-Right: Positions + Account + Logs -->
    <section class="panel">
      <div class="panel-header">
        <span class="panel-title">💼 持仓 & 账户 & 日志</span>
      </div>
      <div class="panel-body" style="display:flex;flex-direction:column;overflow:hidden">
        <account-summary :account="firstAccount"></account-summary>
        <div style="flex:1;overflow:auto;min-height:0">
          <div style="font-size:10px;color:var(--text-dim);padding:4px 12px;font-weight:600">持仓</div>
          <position-table :items="positionList"></position-table>
          <div style="font-size:10px;color:var(--text-dim);padding:4px 12px;font-weight:600;margin-top:4px">日志</div>
          <log-panel :items="$s.log" style="max-height:200px;overflow:auto"></log-panel>
        </div>
      </div>
    </section>
  </div>

  <!-- Status Bar -->
  <status-bar :order-count="orderList.length" :trade-count="tradeList.length"
    :pos-count="positionList.length" :tick-count="tickList.length"></status-bar>

  <!-- Account Modal -->
  <account-modal :visible="showAccountModal" :accounts="accountList"
    @close="showAccountModal = false" @delete="delAccount"></account-modal>
</div>

<script src="/js/store.js"></script>
<script src="/js/index-app.js"></script>
</body>
</html>
