<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeighNa Trader — WebAssembly</title>
<style>
  :root {
    --bg: #1e1e1e; --surface: #2d2d2d; --border: #3c3c3c;
    --text: #d4d4d4; --dim: #808080;
    --bid: #ffaec9; --ask: #a0ffa0;
    --long: #ff4444; --short: #00aa00;
    --accent: #007acc;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
  header{height:40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px}
  header h1{font-size:14px} header h1 span{color:var(--accent)}
  .badge{font-size:10px;padding:2px 8px;border-radius:999px}
  .badge.wasm{background:rgba(99,73,247,0.2);color:#a371f7}
  .badge.on{background:rgba(63,185,80,0.15);color:#3fb950}
  .badge.off{background:rgba(248,81,73,0.15);color:#f85149}
  main{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;overflow:hidden}
  .info-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;font-size:13px}
  .info-box .icon{font-size:24px}
  .grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr;gap:12px;overflow:hidden}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
  .card h2{font-size:12px;text-transform:uppercase;color:var(--dim);padding:8px 12px;border-bottom:1px solid var(--border);letter-spacing:1px}
  .card .body{flex:1;overflow:auto;padding:8px;font-family:'Consolas',monospace;font-size:12px}
  textarea{width:100%;height:100%;background:var(--bg);color:var(--text);border:none;font-family:'Consolas',monospace;font-size:12px;resize:none;outline:none;padding:8px}
  button{padding:6px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
  .btn-primary{background:var(--accent);color:#fff;border:none}
  .btn-buy{background:#c42b1c;color:#fff;border:none}
  .btn-sell{background:#0b6016;color:#fff;border:none}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
  .result{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px;margin:8px 0;font-family:'Consolas',monospace;font-size:12px}
  .result .val{color:var(--accent);font-weight:700}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th{background:var(--bg);padding:4px 8px;text-align:left;color:var(--dim);border-bottom:1px solid var(--border)}
  td{padding:3px 8px;border-bottom:1px solid rgba(255,255,255,0.02)}
  .bid{color:var(--bid)} .ask{color:var(--ask)}
</style>
</head>
<body>
<header>
  <h1>VeighNa <span>WebAssembly</span> Trader</h1>
  <span id="wasm-status" class="badge off">WASM Loading...</span>
  <span id="ws-status" class="badge off">WS Offline</span>
  <span style="flex:1"></span>
  <span style="font-size:11px;color:var(--dim)" id="clock"></span>
</header>

<main>
  <!-- WASM Engine Info -->
  <div class="info-box">
    <div class="icon">⚡</div>
    <div>
      <b>C++ WebAssembly Engine Active</b><br>
      <span style="color:var(--dim)">Native-speed order processing, VWAP/Sharpe/MaxDD calculations in C++</span>
    </div>
    <span style="flex:1"></span>
    <span id="perf-info" style="font-size:11px;color:var(--dim)"></span>
  </div>

  <!-- Main grid: Trading + Data -->
  <div class="grid">
    <!-- Trading Panel -->
    <div class="card" style="grid-row:1/3">
      <h2>📝 Trading (WASM Engine)</h2>
      <div class="body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px">
          <input id="sym" placeholder="Symbol" style="padding:4px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:2px">
          <select id="ex" style="padding:4px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:2px">
            <option>SHFE</option><option>CFFEX</option><option>DCE</option><option>CZCE</option><option>INE</option>
          </select>
          <input id="prc" placeholder="Price" type="number" step="any" style="padding:4px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:2px">
          <input id="vol" placeholder="Volume" type="number" step="any" value="1" style="padding:4px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:2px">
          <select id="dir" style="padding:4px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:2px">
            <option value="LONG">多</option><option value="SHORT">空</option>
          </select>
          <select id="ofs" style="padding:4px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:2px">
            <option value="OPEN">开</option><option value="CLOSE">平</option>
          </select>
        </div>
        <div class="btn-row" style="margin-top:8px">
          <button class="btn-buy" onclick="wasmOrder('LONG')">Buy</button>
          <button class="btn-sell" onclick="wasmOrder('SHORT')">Sell</button>
          <button class="btn-primary" onclick="wasmSubscribe()">Subscribe</button>
          <button onclick="wasmQuery()" style="background:var(--surface);border:1px solid var(--border);color:var(--text)">Query</button>
        </div>
        <div id="order-result" class="result" style="margin-top:8px;display:none"></div>
      </div>
    </div>

    <!-- Native C++ Calculations Demo -->
    <div class="card">
      <h2>⚡ C++ Native Speed: VWAP / Sharpe / MaxDD</h2>
      <div class="body">
        <button class="btn-primary" onclick="runBenchmark()">Run C++ WASM Calculation Benchmark</button>
        <div id="bench-result" class="result" style="display:none"></div>
      </div>
    </div>

    <!-- Events Log -->
    <div class="card">
      <h2>📊 Real-time Events (via WASM Engine)</h2>
      <div class="body">
        <div style="overflow:auto;max-height:150px">
          <table><thead><tr><th>Type</th><th>Symbol</th><th>Data</th></tr></thead>
          <tbody id="event-log"></tbody></table>
        </div>
        <div class="btn-row" style="margin-top:8px">
          <button onclick="document.getElementById('event-log').innerHTML=''" style="background:var(--surface);border:1px solid var(--border);color:var(--text)">Clear</button>
          <span id="event-count" style="font-size:11px;color:var(--dim)">0 events</span>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="veighna_wasm.js"></script>
<script>
// ---- Wait for WASM module to initialize ----
var wasmReady = false;
var eventCount = 0;

window.onWasmReady = function() {
  wasmReady = true;
  document.getElementById('wasm-status').textContent = 'WASM Ready';
  document.getElementById('wasm-status').className = 'badge on';

  // Bind C++ functions
  WasmEngine.sendOrder = Module.cwrap('sendOrder', null,
    ['string','string','string','string','number','number','string','string']);
  WasmEngine.cancelOrder = Module.cwrap('cancelOrder', null,
    ['string','string','string','string']);
  WasmEngine.subscribe = Module.cwrap('subscribeSymbol', null, ['string','string']);
  WasmEngine.queryAccount = Module.cwrap('queryAccount', null, []);
  WasmEngine.queryPosition = Module.cwrap('queryPosition', null, []);
  WasmEngine.connectGateway = Module.cwrap('connectGateway', null, ['string','string']);
  WasmEngine.calcVWAP = Module.cwrap('calculateVWAP', 'number', ['array','array','number']);
  WasmEngine.calcSharpe = Module.cwrap('calculateSharpe', 'number', ['array','number','number']);
  WasmEngine.calcMaxDD = Module.cwrap('calculateMaxDrawdown', 'number', ['array','number']);

  console.log('✅ WASM Engine ready —', Object.keys(WasmEngine).filter(k => typeof WasmEngine[k] === 'function').length, 'C++ functions bound');
};

window.onWasmConnected = function() {
  document.getElementById('ws-status').textContent = 'WS Connected';
  document.getElementById('ws-status').className = 'badge on';
};

// ---- Set up event handlers ----
WasmEngine.on('tick', function(d) { addEvent('TICK', d.vt_symbol, d.last_price); });
WasmEngine.on('order', function(d) { addEvent('ORDER', d.vt_symbol, d.status); });
WasmEngine.on('trade', function(d) { addEvent('TRADE', d.vt_symbol, d.price+'@'+d.volume); });
WasmEngine.on('position', function(d) { addEvent('POS', d.vt_symbol, d.volume); });
WasmEngine.on('account', function(d) { addEvent('ACCT', d.vt_accountid, d.balance); });
WasmEngine.on('log', function(d) { addEvent('LOG', d.gateway_name||'', d.msg||''); });

function addEvent(type, symbol, data) {
  eventCount++;
  var tbody = document.getElementById('event-log');
  var row = '<tr><td><b>' + type + '</b></td><td>' + (symbol||'') + '</td><td>' + (data||'') + '</td></tr>';
  tbody.innerHTML = row + tbody.innerHTML;
  if (tbody.children.length > 100) tbody.removeChild(tbody.lastChild);
  document.getElementById('event-count').textContent = eventCount + ' events';
}

// ---- Trading via WASM engine (C++ call) ----
function wasmOrder(dir) {
  if (!wasmReady) return alert('WASM not ready');
  var sym = document.getElementById('sym').value;
  var ex = document.getElementById('ex').value;
  var prc = parseFloat(document.getElementById('prc').value)||0;
  var vol = parseFloat(document.getElementById('vol').value)||1;
  var ofs = document.getElementById('ofs').value;
  if (!sym) return alert('Enter symbol');

  // Call C++ function directly
  WasmEngine.sendOrder(sym, ex, dir, ofs, prc, vol, 'LIMIT', '');
  var el = document.getElementById('order-result');
  el.style.display = 'block';
  el.innerHTML = '✅ [WASM C++] Order sent: <span class="val">' + sym + '.' + ex + '</span> ' + dir + ' ' + prc + ' x ' + vol;
}

function wasmSubscribe() {
  if (!wasmReady) return alert('WASM not ready');
  var sym = document.getElementById('sym').value;
  var ex = document.getElementById('ex').value;
  if (!sym) return alert('Enter symbol');
  WasmEngine.subscribe(sym, ex);
}

function wasmQuery() {
  if (!wasmReady) return;
  WasmEngine.queryAccount();
  setTimeout(function() { WasmEngine.queryPosition(); }, 300);
}

// ---- C++ WASM Performance Benchmark ----
function runBenchmark() {
  if (!wasmReady) return alert('WASM not ready');

  // Generate test data (100K data points)
  var N = 100000;
  var prices = new Float64Array(N);
  var volumes = new Float64Array(N);
  var returns = new Float64Array(N);
  var equity = new Float64Array(N);
  var eq = 100000.0;

  for (var i = 0; i < N; i++) {
    prices[i] = 100.0 + Math.random() * 50.0;
    volumes[i] = Math.random() * 10000;
    returns[i] = (Math.random() - 0.5) * 0.04;
    eq *= (1 + returns[i]);
    equity[i] = eq;
  }

  // Benchmark: run 100 iterations
  var iterations = 100;
  var start = performance.now();
  var vwap, sharpe, maxdd;
  for (var i = 0; i < iterations; i++) {
    vwap = WasmEngine.calcVWAP(prices, volumes, N);
    sharpe = WasmEngine.calcSharpe(returns, N, 0.02/252);
    maxdd = WasmEngine.calcMaxDD(equity, N);
  }
  var end = performance.now();
  var totalMs = (end - start);
  var perIter = totalMs / iterations;

  var el = document.getElementById('bench-result');
  el.style.display = 'block';
  el.innerHTML =
    '<b>C++ WASM Benchmark Results (' + N.toLocaleString() + ' points, ' + iterations + ' iterations)</b><br>' +
    'VWAP: <span class="val">' + vwap.toFixed(4) + '</span> | ' +
    'Sharpe: <span class="val">' + sharpe.toFixed(4) + '</span> | ' +
    'MaxDD: <span class="val">' + (maxdd*100).toFixed(2) + '%</span><br>' +
    '⏱ Total: <span class="val">' + totalMs.toFixed(1) + 'ms</span> | ' +
    'Per iteration: <span class="val">' + perIter.toFixed(3) + 'ms</span> | ' +
    'Data processed: <span class="val">' + ((N*iterations/1000000).toFixed(0)) + 'M points</span>';

  document.getElementById('perf-info').textContent =
    'WASM: ' + perIter.toFixed(2) + 'ms/100Kpts (C++ native)';
}

// ---- Clock ----
setInterval(function() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}, 1000);
</script>
</body>
</html>
