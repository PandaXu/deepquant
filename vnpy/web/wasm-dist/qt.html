<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeighNa Trader — Qt/WASM</title>
<style>
  *{margin:0;padding:0} body{background:#1e1e1e;overflow:hidden}
  #loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#d4d4d4;font-family:'Segoe UI',sans-serif;font-size:18px;text-align:center}
  #loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid #3c3c3c;border-top-color:#007acc;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .wasm-badge{position:fixed;bottom:8px;right:8px;padding:2px 8px;background:rgba(163,113,247,0.2);color:#a371f7;border-radius:4px;font-family:'Segoe UI',sans-serif;font-size:10px;z-index:9999}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><br>Loading VeighNa Qt/WASM...</div>
<div class="wasm-badge">C++ Qt/WASM</div>
<script>
  var Module = {
    canvas: (function() {
      var canvas = document.createElement('canvas');
      canvas.id = 'canvas';
      canvas.style.cssText = 'display:block;width:100vw;height:100vh;';
      document.body.appendChild(canvas);
      return canvas;
    })(),
    onRuntimeInitialized: function() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    }
  };
</script>
<script src="/wasm-dist/qt_wasm.js"></script>
</body>
</html>
