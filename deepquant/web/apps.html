<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeighNa App</title>
<style>
:root { --bg:#1e1e1e;--bg2:#2d2d2d;--bg3:#252526;--text:#d4d4d4;--dim:#808080;--blue:#569cd6;--accent:#007acc;--border:#3c3c3c;--red:#c42b1c;--green:#0b6016;--hdr:#333; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC',sans-serif;font-size:12px;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
#titlebar{height:30px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px}
#titlebar .t{font-weight:600;font-size:13px}
#titlebar .back{color:var(--accent);cursor:pointer;font-size:11px;text-decoration:none}
#content{flex:1;overflow:auto;padding:16px}
h2{font-size:16px;margin-bottom:12px;color:var(--blue)}
.row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.row label{min-width:100px;color:var(--dim);font-size:11px;text-align:right}
input,select,button{padding:4px 8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:3px;font-size:12px}
button{cursor:pointer;font-weight:600}
button:hover{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border:none}
.btn-danger{background:var(--red);color:#fff;border:none}
.btn-success{background:var(--green);color:#fff;border:none}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
th{background:var(--hdr);padding:4px 8px;text-align:left;border-bottom:1px solid var(--border);font-size:11px;color:var(--text)}
td{padding:3px 8px;border-bottom:1px solid rgba(255,255,255,0.03)}
tr:nth-child(even){background:rgba(255,255,255,0.02)}
tr:hover{background:rgba(0,122,204,0.1)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}
.card h3{font-size:13px;margin-bottom:10px;color:var(--text)}
.mgr-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:10px}
.mgr-card h4{font-size:13px;margin-bottom:8px}
.mgr-card .btns{display:flex;gap:6px;margin-bottom:8px}
.status-badge{padding:1px 8px;border-radius:999px;font-size:10px;display:inline-block}
.status-badge.inited{background:rgba(88,166,255,0.2);color:var(--blue)}
.status-badge.trading{background:rgba(63,185,80,0.2);color:#3fb950}
.status-badge.stopped{background:rgba(248,81,73,0.2);color:#f85149}
.log-panel{font-family:monospace;font-size:11px;max-height:200px;overflow:auto;background:var(--bg3);padding:8px;border-radius:4px}
.log-entry{padding:1px 0}
</style>
</head>
<body>
<div id="titlebar">
  <span class="t"><a href="/" class="back">← VeighNa</a> — <span id="app-title">App</span></span>
</div>
<div id="content"></div>

<script>
const APP_NAME = new URLSearchParams(location.search).get('name') || 'PaperAccount';
var LABELS={PaperAccount:"模拟交易",CtaStrategy:"CTA策略",CtaBacktester:"CTA回测",DataManager:"数据管理"};document.getElementById("app-title").textContent=LABELS[APP_NAME]||APP_NAME;

const content = document.getElementById('content');

// ---- PaperAccount ----
function render_paper_account() {
  content.innerHTML = `<h2>模拟交易设置</h2>
  <div class="card">
    <div class="row"><label>成交滑点 (跳)</label><input id="pa-slippage" type="number" min="0" value="0"><span style="color:var(--dim);font-size:11px">市价/停止策略委托的滑点</span></div>
    <div class="row"><label>计算频率 (秒)</label><input id="pa-interval" type="number" min="1" value="30"><span style="color:var(--dim);font-size:11px">持仓盈亏计算频率</span></div>
    <div class="row"><label>立即撮合</label><input id="pa-instant" type="checkbox" checked><span style="color:var(--dim);font-size:11px">下单后立即用当前盘口撮合</span></div>
    <div class="row" style="margin-top:16px">
      <button class="btn-primary" onclick="pa_save()">保存设置</button>
      <button class="btn-danger" onclick="pa_clear()">清空所有持仓</button>
    </div>
  </div>`;
  ws_send({action:'get_paper_settings',payload:{}});
}

function pa_save() {
  ws_send({action:'set_paper_settings',payload:{
    slippage: parseInt(document.getElementById('pa-slippage').value)||0,
    interval: parseInt(document.getElementById('pa-interval').value)||30,
    instant: document.getElementById('pa-instant').checked
  }});
}
function pa_clear() { if(confirm('确认清空所有模拟持仓?')) ws_send({action:'paper_clear_position',payload:{}}); }

// ---- CtaStrategy ----
function render_cta_strategy() {
  content.innerHTML = `<h2>CTA策略管理</h2>
  <div class="card">
    <div class="row">
      <select id="cs-class"><option value="">选择策略类型...</option></select>
      <button class="btn-primary" onclick="cs_add()">添加策略</button>
      <span style="flex:1"></span>
      <button class="btn-primary" onclick="cs_action('init_all')">全部初始化策略</button>
      <button class="btn-success" onclick="cs_action('start_all')">全部启动策略</button>
      <button class="btn-danger" onclick="cs_action('stop_all')">全部停止策略</button>
      <button onclick="cs_clear_log()">清空日志</button>
    </div>
  </div>
  <div id="cs-strategies"></div>
  <div class="card" style="margin-top:12px">
    <h3>日志</h3>
    <div class="log-panel" id="cs-log"></div>
  </div>`;
  ws_send({action:'get_cta_classes',payload:{}});
  ws_send({action:'get_cta_strategies',payload:{}});
}

function cs_add() {
  const cls = document.getElementById('cs-class').value;
  if (!cls) return alert('选择策略类型');
  // Show setting editor dialog
  ws_send({action:'get_cta_params',payload:{class_name:cls}});
  // Listen for params response and show dialog
  function onParams(m) {
    if (m.type === 'cta_params' && m.data) {
      ws.removeEventListener('message', tempHandler);
      show_setting_editor(m.data, m.class_name, null, (setting) => {
        ws_send({action:'add_cta_strategy',payload:{
          class_name: cls, strategy_name: setting.strategy_name,
          vt_symbol: setting.vt_symbol, parameters: setting
        }});
        setTimeout(() => ws_send({action:'get_cta_strategies',payload:{}}), 500);
      });
    }
  }
  function tempHandler(e) { try { onParams(JSON.parse(e.data)); } catch(ex) {} }
  ws.addEventListener('message', tempHandler);
}
function cs_strategy_edit(name) {
  ws_send({action:'get_cta_strategies',payload:{}});
  function onStrats(m) {
    if (m.type === 'cta_strategies') {
      ws.removeEventListener('message', tempHandler);
      const strat = (m.data||[]).find(s => s.strategy_name === name);
      if (strat) {
        show_setting_editor(strat.parameters, strat.class_name, name, (setting) => {
          ws_send({action:'edit_cta_strategy',payload:{strategy_name:name, setting:setting}});
          setTimeout(() => ws_send({action:'get_cta_strategies',payload:{}}), 500);
        });
      }
    }
  }
  function tempHandler(e) { try { onStrats(JSON.parse(e.data)); } catch(ex) {} }
  ws.addEventListener('message', tempHandler);
}
function cs_action(action) { ws_send({action:'cta_'+action,payload:{}}); }
function cs_clear_log() { document.getElementById('cs-log').innerHTML = ''; }

function show_setting_editor(parameters, class_name, strategy_name, callback) {
  const overlay = document.createElement('div'); overlay.className = 'modal-overlay show';
  const title = strategy_name ? `参数编辑参数：${strategy_name}` : `添加策略：${class_name}`;
  const btnText = strategy_name ? '确定' : '添加';
  const fields = Object.entries(parameters).map(([k,v]) => {
    return `<div class="row"><label>${k} &lt;${typeof v}&gt;</label><input id="se-${k}" value="${v}" style="flex:1"></div>`;
  }).join('');
  overlay.innerHTML = `<div class="modal" style="max-height:80vh;overflow:auto">
    <h2>${title}</h2><div>${fields}</div>
    <div class="btn-row">
      <button onclick="this.closest('.modal-overlay').remove()" style="background:var(--bg3);color:var(--text)">取消</button>
      <button id="se-ok" style="background:var(--accent);color:#fff;border:none">${btnText}</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('se-ok').onclick = () => {
    const setting = {};
    Object.keys(parameters).forEach(k => {
      const el = document.getElementById('se-'+k);
      if (!el) return;
      const v = el.value;
      setting[k] = typeof parameters[k] === 'boolean' ? (v==='True'||v==='true')
        : typeof parameters[k] === 'number' ? parseFloat(v)||0
        : typeof parameters[k] === 'string' ? v : v;
    });
    overlay.remove();
    callback(setting);
  };
}

// ---- CtaBacktester ----
function render_cta_backtester() {
  content.innerHTML = `<h2>CTA策略回测</h2>
  <div class="card">
    <h3>回测配置</h3>
    <div class="row"><label>策略类型</label><select id="bt-class"><option value="">选择...</option></select></div>
    <div class="row"><label>回测合约</label><input id="bt-symbol" placeholder="如 rb2510.SHFE"></div>
    <div class="row"><label>K线周期</label>
      <select id="bt-interval"><option value="MINUTE">分钟线</option><option value="HOUR">小时线</option><option value="DAILY">日线</option></select></div>
    <div class="row"><label>回测起始日</label><input id="bt-start" type="date" value="2024-01-01"></div>
    <div class="row"><label>回测结束日</label><input id="bt-end" type="date" value="2025-01-01"></div>
    <div class="row"><label>初始资金</label><input id="bt-capital" type="number" value="1000000"></div>
    <div class="row"><label>手续费率</label><input id="bt-rate" type="number" step="any" value="0.0001"></div>
    <div class="row"><label>滑点</label><input id="bt-slippage" type="number" step="any" value="0.2"></div>
    <div class="row"><label>合约乘数</label><input id="bt-size" type="number" value="10"></div>
    <div class="row"><label>价格跳动</label><input id="bt-pricetick" type="number" step="any" value="1"></div>
    <div class="row" style="margin-top:12px">
      <button class="btn-primary" onclick="bt_start()">开始回测</button>
    </div>
  </div>
  <div class="card" id="bt-results" style="display:none">
    <h3>回测结果统计</h3>
    <div id="bt-stats"></div>
  </div>
  <div class="card" style="margin-top:12px">
    <h3>日志</h3>
    <div class="log-panel" id="bt-log"></div>
  </div>`;
  ws_send({action:'get_backtest_classes',payload:{}});
}

function bt_start() {
  ws_send({action:'start_backtesting',payload:{
    class_name: document.getElementById('bt-class').value,
    vt_symbol: document.getElementById('bt-symbol').value,
    interval: document.getElementById('bt-interval').value,
    start: document.getElementById('bt-start').value,
    end: document.getElementById('bt-end').value,
    capital: parseFloat(document.getElementById('bt-capital').value)||1000000,
    rate: parseFloat(document.getElementById('bt-rate').value)||0.0001,
    slippage: parseFloat(document.getElementById('bt-slippage').value)||0.2,
    size: parseInt(document.getElementById('bt-size').value)||10,
    pricetick: parseFloat(document.getElementById('bt-pricetick').value)||1,
  }});
  document.getElementById('bt-results').style.display = 'block';
  document.getElementById('bt-stats').innerHTML = '<span style="color:var(--dim)">回测运行中...</span>';
}

// ---- DataManager ----
async function render_data_manager() {
  let products = [];
  try { const r = await fetch('/api/contracts/products?exchange=CFFEX'); const d = await r.json(); products = d.products || []; } catch(e) {}

  content.innerHTML = `<h2>数据管理</h2>
  <div class="card">
    <h3>下载历史数据</h3>
    <div class="row"><label>交易所</label><select id="dm-ex" onchange="dm_on_exchange()">
      <option value="CFFEX">CFFEX(中金所)</option><option value="SHFE">SHFE(上期所)</option>
      <option value="DCE">DCE(大商所)</option><option value="CZCE">CZCE(郑商所)</option>
      <option value="INE">INE(上能源)</option><option value="GFEX">GFEX(广期所)</option>
    </select></div>
    <div class="row"><label>品种</label><select id="dm-product" onchange="dm_on_product()"><option value="">全部品种</option></select></div>
    <div class="row"><label>合约</label><select id="dm-symbol"><option value="">全部合约</option></select></div>
    <div class="row"><label>周期</label><select id="dm-interval">
      <option value="MINUTE">分钟线 (1m)</option><option value="HOUR">小时线 (1h)</option><option value="DAILY" selected>日线 (d)</option>
    </select></div>
    <div class="row"><label>起始日</label><input id="dm-start" type="date" value="2025-01-01"></div>
    <div class="row"><label>结束日</label><input id="dm-end" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="row" style="margin-top:12px">
      <button class="btn-primary" onclick="dm_download()">下载并导入</button>
      <button class="btn-success" onclick="dm_refresh()">刷新已导入数据</button>
    </div>
    <div id="dm-status" style="margin-top:8px;color:var(--dim);font-size:11px"></div>
  </div>
  <div class="card">
    <h3>已导入数据概览</h3>
    <table><thead><tr><th>合约</th><th>交易所</th><th>周期</th><th>数据量</th><th>开始时间</th><th>结束时间</th></tr></thead>
    <tbody id="dm-table"><tr><td colspan="6" style="color:var(--dim)">点击刷新加载</td></tr></tbody></table>
  </div>`;
  dm_on_exchange();
}

async function dm_on_exchange() {
  const ex = document.getElementById('dm-ex').value;
  const sel = document.getElementById('dm-product');
  sel.innerHTML = '<option value="">加载中...</option>';
  try {
    const r = await fetch(`/api/contracts/products?exchange=${ex}`);
    const d = await r.json();
    sel.innerHTML = '<option value="">全部品种</option>' + (d.products||[]).map(p => `<option value="${p.prefix}">${p.prefix} - ${p.name}</option>`).join('');
  } catch(e) { sel.innerHTML = '<option value="">加载失败</option>'; }
  dm_on_product();
}

async function dm_on_product() {
  const ex = document.getElementById('dm-ex').value;
  const prod = document.getElementById('dm-product').value;
  const sel = document.getElementById('dm-symbol');
  sel.innerHTML = '<option value="">加载中...</option>';
  try {
    const params = new URLSearchParams({exchange:ex});
    if (prod) params.set('product', prod);
    const r = await fetch(`/api/contracts/public?${params}`);
    const d = await r.json();
    sel.innerHTML = '<option value="">全部合约</option>' + (d.contracts||[]).map(c => `<option value="${c.symbol}">${c.symbol} | ${c.name}</option>`).join('');
  } catch(e) { sel.innerHTML = '<option value="">加载失败</option>'; }
}

function dm_download() {
  const sym = document.getElementById('dm-symbol').value;
  const ex = document.getElementById('dm-ex').value;
  const interval = document.getElementById('dm-interval').value;
  const start = document.getElementById('dm-start').value;
  const end = document.getElementById('dm-end').value;
  if (!sym) return alert('请选择合约');
  const st = document.getElementById('dm-status');
  st.textContent = `下载中: ${sym}.${ex} ${interval} ${start}~${end}...`;
  ws_send({action:'download_bar_data',payload:{symbol:sym,exchange:ex,interval,start,end}});
}

function dm_refresh() { ws_send({action:'get_data_overview',payload:{}}); }

// ---- WebSocket ----
let ws;
function ws_connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => console.log('App WS connected');
  ws.onmessage = e => handle_msg(JSON.parse(e.data));
  ws.onclose = () => setTimeout(ws_connect, 2000);
}
function ws_send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

function handle_msg(m) {
  const t = m.type, d = m.data;
  if (t === 'paper_settings' && d) {
    document.getElementById('pa-slippage').value = d.slippage || 0;
    document.getElementById('pa-interval').value = d.interval || 30;
    document.getElementById('pa-instant').checked = d.instant !== false;
  }
  if (t === 'cta_classes' && d) {
    const sel = document.getElementById('cs-class');
    if (sel) { sel.innerHTML = '<option value="">选择策略类型...</option>' + d.map(c => `<option>${c}</option>`).join(''); }
  }
  if (t === 'bt_classes' && d) {
    const sel = document.getElementById('bt-class');
    if (sel) { sel.innerHTML = '<option value="">选择...</option>' + d.map(c => `<option>${c}</option>`).join(''); }
  }
  if (t === 'cta_strategies' && d) {
    const el = document.getElementById('cs-strategies');
    if (el) {
      el.innerHTML = d.map(s => `<div class="mgr-card">
        <h4>${s.strategy_name} — ${s.vt_symbol} <span style="font-size:10px;color:var(--dim)">(${s.class_name})</span>
          <span class="status-badge ${s.variables?.trading?'trading':s.variables?.inited?'inited':'stopped'}">${s.variables?.trading?'运行中':s.variables?.inited?'已初始化策略':'已停止策略'}</span></h4>
        <div class="btns">
          <button onclick="cs_strategy_action('${s.strategy_name}','init')" ${s.variables?.inited?'disabled':''}>初始化策略</button>
          <button onclick="cs_strategy_action('${s.strategy_name}','start')" ${s.variables?.trading?'disabled':''}>启动策略</button>
          <button onclick="cs_strategy_action('${s.strategy_name}','stop')" ${!s.variables?.trading?'disabled':''}>停止策略</button>
          <button onclick="cs_strategy_edit('${s.strategy_name}')" ${s.variables?.trading?'disabled':''}>编辑参数</button>
          <button onclick="cs_strategy_action('${s.strategy_name}','remove')" ${s.variables?.trading?'disabled':''}>移除策略</button>
        </div>
        <table><thead><tr>${Object.keys(s.parameters||{}).map(k=>`<th>${k}</th>`).join('')}</tr></thead>
        <tbody><tr>${Object.values(s.parameters||{}).map(v=>`<td>${v}</td>`).join('')}</tr></tbody></table>
        <table style="margin-top:8px"><thead><tr>${Object.keys(s.variables||{}).map(k=>`<th>${k}</th>`).join('')}</tr></thead>
        <tbody><tr>${Object.values(s.variables||{}).map(v=>`<td>${v}</td>`).join('')}</tr></tbody></table>
      </div>`).join('') || '<div style="color:var(--dim)">无已添加策略</div>';
    }
  }
  if (t === 'backtest_result' && d) {
    document.getElementById('bt-stats').innerHTML =
      `<table><tr><td>总收益率</td><td style="color:${d.total_return>0?'#ff4444':'#00aa00'}">${(d.total_return*100).toFixed(2)}%</td></tr>
      <tr><td>夏普比率</td><td>${(d.sharpe_ratio||0).toFixed(2)}</td></tr>
      <tr><td>最大回撤</td><td>${(d.max_drawdown*100).toFixed(2)}%</td></tr>
      <tr><td>总交易日</td><td>${d.total_days||0}</td></tr>
      <tr><td>总成交笔数</td><td>${d.total_trades||0}</td></tr></table>`;
  }
  if (t === 'data_overview' && d) {
    const el = document.getElementById('dm-table');
    if (el) {
      el.innerHTML = (d||[]).map(r => `<tr><td>${r.vt_symbol||''}</td><td>${r.symbol||''}</td><td>${r.exchange||''}</td><td>${r.interval||''}</td><td>${r.count||0}</td><td>${r.start||''}</td><td>${r.end||''}</td></tr>`).join('') || '<tr><td colspan="7" style="color:var(--dim)">无数据</td></tr>';
    }
  }
  if (t === 'log' && d) {
    ['cs-log','bt-log'].forEach(id => {
      const el = document.getElementById(id); if (el) el.innerHTML += `<div class="log-entry">${d.msg||''}</div>`;
    });
  }
}

function cs_strategy_action(name, action) {
  ws_send({action:'cta_strategy_'+action,payload:{strategy_name:name}});
}

// ---- Router ----
const renderers = {
  PaperAccount: render_paper_account,
  CtaStrategy: render_cta_strategy,
  CtaBacktester: render_cta_backtester,
  DataManager: render_data_manager,
};
if (renderers[APP_NAME]) renderers[APP_NAME]();
else content.innerHTML = '<h2>未知App: ' + APP_NAME + '</h2>';

ws_connect();
// Poll for strategy updates
if (APP_NAME === 'CtaStrategy') setInterval(() => ws_send({action:'get_cta_strategies',payload:{}}), 3000);
</script>
</body>
</html>
